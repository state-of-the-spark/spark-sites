# Biz Scout — Daily Sunbiz scraper for Polk County businesses
#
# Runs daily at 8 AM ET (12:00 UTC). Downloads the latest daily
# corporate filing data from Florida Sunbiz, filters for Polk County,
# pushes to Google Sheets, and commits CSV artifacts.
#
# Required GitHub Secrets:
#   GOOGLE_SERVICE_ACCOUNT_JSON — service account key with Editor access to the Sheet
#   GMAIL_APP_PASSWORD          — Gmail app password for grant@stateofthespark.com

name: Biz Scout

on:
  schedule:
    # 8:00 AM ET = 12:00 UTC (EST) / 11:00 UTC (EDT)
    - cron: "0 12 * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agents/biz-scout/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/biz-scout/requirements.txt

      - name: Run Biz Scout (daily)
        working-directory: agents/biz-scout
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py --active-only --push-sheet

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biz-scout-data-${{ github.run_number }}
          path: |
            agents/biz-scout/data/*.csv
          retention-days: 30

      - name: Commit output
        run: |
          git config user.name "Biz Scout Bot"
          git config user.email "bot@sparkmysite.com"
          git add agents/biz-scout/data/
          git diff --cached --quiet || git commit -m "[biz-scout] daily run $(date +%Y-%m-%d)"
          git push

      - name: Summary
        if: always()
        working-directory: agents/biz-scout
        run: |
          echo "## Biz Scout Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/polk-county-businesses.csv ]; then
            TOTAL=$(wc -l < data/polk-county-businesses.csv)
            echo "- **Total Polk County businesses:** $((TOTAL - 1))" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **No data file generated**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f data/polk-county-new-this-week.csv ]; then
            NEW=$(wc -l < data/polk-county-new-this-week.csv)
            echo "- **New this week:** $((NEW - 1))" >> $GITHUB_STEP_SUMMARY
          fi
